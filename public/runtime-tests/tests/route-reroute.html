<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-reroute</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-reroute', 'Programmatic navigation should reroute the mounted route view immediately.', async ({ app, step, click, waitFor, assertContains }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/', re: '/^\\/$/', keys: [] },
            { pat: '/details/:id', re: '/^\\/details\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [
            {
              k: 'el',
              tag: 'button',
              props: {
                attrs: { id: 'go-details' },
                style: {},
                on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/details/42' } } }],
              },
              children: [{ k: 'text', value: { k: 'val', v: 'Open details' } }],
            },
            {
              k: 'el',
              tag: 'div',
              props: { attrs: { id: 'details-view' }, style: {}, on: [] },
              children: [
                { k: 'text', value: { k: 'val', v: 'Details:' } },
                { k: 'text', value: { k: 'param', name: 'id' } },
              ],
            },
          ],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('navigate action triggers reroute to the new view', async () => {
          click(app.querySelector('#go-details'));
          await waitFor(() => {
            assertContains(app.textContent, 'Details:42', 'navigate action should rerender the matched route view');
          }, { label: 'route reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
