<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-basic</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-basic', 'Client-side routing should resolve a matching view and expose params/query.', async ({ app, step, assertEqual, assertContains }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/users/42?tab=info');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/', re: '/^\\/$/', keys: [] },
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [
            { k: 'text', value: { k: 'val', v: 'Home' } },
            {
              k: 'el',
              tag: 'div',
              props: { attrs: {}, style: {}, on: [] },
              children: [
                { k: 'text', value: { k: 'param', name: 'id' } },
                { k: 'text', value: { k: 'val', v: ':' } },
                { k: 'text', value: { k: 'query', name: 'tab' } },
              ],
            },
          ],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('route mount resolves the matching view', async () => {
          assertContains(app.textContent, '42:info', 'route should render matched params and query');
        });

        await step('route output does not use the fallback for a match', async () => {
          assertEqual(app.textContent.includes('Not found'), false, 'fallback should not be rendered');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
