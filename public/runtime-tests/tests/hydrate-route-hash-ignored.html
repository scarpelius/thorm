<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-hash-ignored</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-hash-ignored', 'Hydration should preserve route matches when hash fragments are present and keep ignoring them after reroute.', async ({ app, step, click, waitFor, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/users/42?tab=info#section-a');

      app.innerHTML = '<!--route:start--><!--fragment:start--><button id="next-user">Open next user</button><div id="hash-route-view"><span id="hash-route-user">42</span>:<span id="hash-route-tab">info</span></div><!--fragment:end--><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [{
            k: 'fragment',
            children: [
              {
                k: 'el',
                tag: 'button',
                props: {
                  attrs: { id: 'next-user' },
                  style: {},
                  on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/users/99?tab=posts#section-b' } } }],
                },
                children: [{ k: 'text', value: { k: 'val', v: 'Open next user' } }],
              },
              {
                k: 'el',
                tag: 'div',
                props: { attrs: { id: 'hash-route-view' }, style: {}, on: [] },
                children: [
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'hash-route-user' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'param', name: 'id' } }],
                  },
                  { k: 'text', value: { k: 'val', v: ':' } },
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'hash-route-tab' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'tab' } }],
                  },
                ],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial route output when a hash fragment is present', async () => {
          assertEqual(app.querySelector('#next-user').textContent, 'Open next user', 'route button should hydrate in place');
          assertEqual(app.querySelector('#hash-route-view').textContent, '42:info', 'hydrated route should ignore the initial hash fragment');
        });

        await step('hydrated route keeps ignoring hash fragments after navigation', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#next-user'));
          await waitFor(() => {
            assertEqual(app.querySelector('#hash-route-view').textContent, '99:posts', 'hydrated route should keep matching from path and query only');
          }, { label: 'hydrated route hash ignored reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
