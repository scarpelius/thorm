<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>effect-route-dispose</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('effect-route-dispose', 'Effects inside a routed view should stop after navigation disposes that view.', async ({ app, step, click, waitFor, assertEqual, assert }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app');

      const ir = {
        atoms: [{ id: 1, initial: 0 }],
        root: {
          k: 'fragment',
          children: [
            {
              k: 'route',
              base: '/app',
              table: [
                { pat: '/', re: '/^\\/$/', keys: [] },
                { pat: '/details/:id', re: '/^\\/details\\/([^/]+)$/', keys: ['id'] },
              ],
              views: [
                {
                  k: 'fragment',
                  children: [
                    {
                      k: 'effect',
                      triggers: [{ type: 'interval', ms: 20 }],
                      actions: [{ k: 'inc', atom: 1, by: 1 }],
                    },
                    {
                      k: 'el',
                      tag: 'div',
                      props: { attrs: { id: 'route-effect-home' }, style: {}, on: [] },
                      children: [{ k: 'text', value: { k: 'val', v: 'Home with effect' } }],
                    },
                    {
                      k: 'el',
                      tag: 'button',
                      props: {
                        attrs: { id: 'go-details' },
                        style: {},
                        on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/details/42' } } }],
                      },
                      children: [{ k: 'text', value: { k: 'val', v: 'Open details' } }],
                    },
                  ],
                },
                {
                  k: 'el',
                  tag: 'div',
                  props: { attrs: { id: 'details-view' }, style: {}, on: [] },
                  children: [
                    { k: 'text', value: { k: 'val', v: 'Details:' } },
                    { k: 'text', value: { k: 'param', name: 'id' } },
                  ],
                },
              ],
              fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
            },
            {
              k: 'el',
              tag: 'span',
              props: { attrs: { id: 'route-effect-count' }, style: {}, on: [] },
              children: [{ k: 'text', value: { k: 'read', atom: 1 } }],
            },
          ],
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('effect inside the initial route view ticks while that view is mounted', async () => {
          await waitFor(() => {
            const value = Number(app.querySelector('#route-effect-count').textContent || '0');
            assert(value >= 1, `expected at least one interval tick in the home route, got ${value}`);
          }, { label: 'route effect interval tick' });
        });

        await step('navigating away disposes the old route view and stops its effect', async () => {
          const count = app.querySelector('#route-effect-count');
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#go-details'));
          await waitFor(() => {
            assertEqual(app.querySelector('#route-effect-home'), null, 'home route view should unmount after navigation');
            assertEqual(app.querySelector('#details-view').textContent, 'Details:42', 'details route should render after navigation');
          }, { label: 'route effect view swap' });

          const beforeWait = Number(count.textContent || '0');
          await new Promise((resolve) => setTimeout(resolve, 80));
          assertEqual(count.textContent, String(beforeWait), 'interval effect should stop after the old route view is disposed');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
