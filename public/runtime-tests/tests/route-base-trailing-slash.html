<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-base-trailing-slash</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-base-trailing-slash', 'Route matching should tolerate a base path that itself ends with a trailing slash.', async ({ app, step, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/admin/users/42');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app/admin/',
          table: [
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [{
            k: 'el',
            tag: 'div',
            props: { attrs: { id: 'base-trailing-view' }, style: {}, on: [] },
            children: [
              { k: 'text', value: { k: 'val', v: 'User:' } },
              { k: 'text', value: { k: 'param', name: 'id' } },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('a trailing slash on the base path does not break route matching', async () => {
          assertEqual(app.querySelector('#base-trailing-view').textContent, 'User:42', 'route should still match when base ends with a slash');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
