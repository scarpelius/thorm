<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>http-json</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('http-json', 'HTTP action should fetch JSON and allow DOM reads from the resulting atom.', async ({ app, step, click, waitFor, assertEqual, assertContains }) => {
      const ir = {
        atoms: [
          { id: 1, initial: [] },
          { id: 2, initial: null },
        ],
        root: {
          k: 'el',
          tag: 'div',
          props: { attrs: {}, style: {}, on: [] },
          children: [
            {
              k: 'el',
              tag: 'button',
              props: {
                attrs: { id: 'fetch-json' },
                style: {},
                on: [{
                  event: 'click',
                  action: {
                    k: 'http',
                    url: { k: 'val', v: '/api/search/?search=Dune' },
                    method: 'GET',
                    parse: 'json',
                    to: 1,
                    status: 2,
                  },
                }],
              },
              children: [{ k: 'text', value: { k: 'val', v: 'Search' } }],
            },
            {
              k: 'el',
              tag: 'div',
              props: { attrs: { id: 'json-payload' }, style: {}, on: [] },
              children: [{
                k: 'text',
                value: {
                  k: 'stringify',
                  value: { k: 'read', atom: 1 },
                },
              }],
            },
            {
              k: 'el',
              tag: 'span',
              props: { attrs: { id: 'json-status' }, style: {}, on: [] },
              children: [{ k: 'text', value: { k: 'read', atom: 2 } }],
            },
          ],
        },
      };

      boot(ir, app, { target: THORM_TARGET_CLIENT });
      const button = app.querySelector('#fetch-json');
      const payload = app.querySelector('#json-payload');
      const status = app.querySelector('#json-status');

      await step('initial JSON target is empty', async () => {
        assertContains(payload.textContent, '[]', 'JSON target should start empty');
      });

      await step('clicking the button fetches JSON results and updates status', async () => {
        click(button);
        await waitFor(() => {
          assertContains(payload.textContent, 'Dune - Frank Herbert', 'JSON response should be stored in the target atom');
          assertEqual(status.textContent, '200', 'status atom should contain 200');
        }, { label: 'JSON response and status' });
      });
    });
  </script>
</body>
</html>
