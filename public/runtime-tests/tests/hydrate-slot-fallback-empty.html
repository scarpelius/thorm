<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-slot-fallback-empty</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-slot-fallback-empty', 'Hydration should preserve slot fallback content when no projection is provided.', async ({ app, step, click, waitFor, assertEqual }) => {
      app.innerHTML = '<div><button id="update-title">Update</button><!--component:start--><section><h2 id="fallback-title">Welcome</h2><div><!--slot:start--><p id="fallback-slot">Fallback content</p><!--slot:end--></div></section><!--component:end--></div>';

      const ir = {
        atoms: [{ id: 1, initial: 'Welcome' }],
        root: {
          k: 'el',
          tag: 'div',
          props: { attrs: {}, style: {}, on: [] },
          children: [
            {
              k: 'el',
              tag: 'button',
              props: {
                attrs: { id: 'update-title' },
                style: {},
                on: [{ event: 'click', action: { k: 'set', atom: 1, to: { k: 'val', v: 'Updated' } } }],
              },
              children: [{ k: 'text', value: { k: 'val', v: 'Update' } }],
            },
            {
              k: 'component',
              props: {
                title: { k: 'read', atom: 1 },
              },
              tpl: {
                k: 'el',
                tag: 'section',
                props: { attrs: {}, style: {}, on: [] },
                children: [
                  {
                    k: 'el',
                    tag: 'h2',
                    props: { attrs: { id: 'fallback-title' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'prop', name: 'title' } }],
                  },
                  {
                    k: 'el',
                    tag: 'div',
                    props: { attrs: {}, style: {}, on: [] },
                    children: [{
                      k: 'slot',
                      children: [{
                        k: 'el',
                        tag: 'p',
                        props: { attrs: { id: 'fallback-slot' }, style: {}, on: [] },
                        children: [{ k: 'text', value: { k: 'val', v: 'Fallback content' } }],
                      }],
                    }],
                  },
                ],
              },
            },
          ],
        },
      };

      boot(ir, app, { target: THORM_TARGET_SERVER, state: { atoms: { 1: 'Welcome' } } });

      await step('hydration preserves fallback slot content when there is no projection', async () => {
        assertEqual(app.querySelector('#fallback-title').textContent, 'Welcome', 'component prop should hydrate against the existing DOM');
        assertEqual(app.querySelector('#fallback-slot').textContent, 'Fallback content', 'slot fallback should hydrate in place when no projection exists');
      });

      await step('fallback-only component hydration remains reactive for props', async () => {
        click(app.querySelector('#update-title'));
        await waitFor(() => {
          assertEqual(app.querySelector('#fallback-title').textContent, 'Updated', 'component props should still react after fallback-only hydration');
          assertEqual(app.querySelector('#fallback-slot').textContent, 'Fallback content', 'fallback slot content should remain stable after prop updates');
        }, { label: 'fallback-only hydration update' });
      });
    });
  </script>
</body>
</html>
