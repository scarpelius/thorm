<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-query-decoded</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-query-decoded', 'Hydration should preserve decoded query values and keep them decoded after reroute.', async ({ app, step, click, waitFor, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/search?term=Ada%20Lovelace&topic=notes%2Fintro');

      app.innerHTML = '<!--route:start--><!--fragment:start--><button id="next-query">Open next query</button><div id="query-view"><span id="query-term">Ada Lovelace</span> | <span id="query-topic">notes/intro</span></div><!--fragment:end--><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/search', re: '/^\\/search$/', keys: [] },
          ],
          views: [{
            k: 'fragment',
            children: [
              {
                k: 'el',
                tag: 'button',
                props: {
                  attrs: { id: 'next-query' },
                  style: {},
                  on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/search?term=Grace%20Hopper&topic=debug%2Freport' } } }],
                },
                children: [{ k: 'text', value: { k: 'val', v: 'Open next query' } }],
              },
              {
                k: 'el',
                tag: 'div',
                props: { attrs: { id: 'query-view' }, style: {}, on: [] },
                children: [
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-term' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'term' } }],
                  },
                  { k: 'text', value: { k: 'val', v: ' | ' } },
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-topic' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'topic' } }],
                  },
                ],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial decoded query values', async () => {
          assertEqual(app.querySelector('#next-query').textContent, 'Open next query', 'route button should hydrate in place');
          assertEqual(app.querySelector('#query-term').textContent, 'Ada Lovelace', 'hydrated query term should stay decoded');
          assertEqual(app.querySelector('#query-topic').textContent, 'notes/intro', 'hydrated query topic should stay decoded');
        });

        await step('hydrated route keeps query values decoded after navigation', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#next-query'));
          await waitFor(() => {
            assertEqual(app.querySelector('#query-term').textContent, 'Grace Hopper', 'rerouted query term should be decoded');
            assertEqual(app.querySelector('#query-topic').textContent, 'debug/report', 'rerouted query topic should be decoded');
            assertEqual(app.querySelector('#query-view').textContent, 'Grace Hopper | debug/report', 'decoded query values should render correctly after hydrated navigation');
          }, { label: 'hydrated decoded query reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
