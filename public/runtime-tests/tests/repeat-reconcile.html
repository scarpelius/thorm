<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>repeat-reconcile</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('repeat-reconcile', 'Repeat should render rows from atom state and reconcile updates.', async ({ app, step, waitMicrotasks, assertEqual }) => {
      const ir = {
        atoms: [{
          id: 1,
          initial: [
            { id: 1, label: 'One' },
            { id: 2, label: 'Two' },
          ],
        }],
        root: {
          k: 'repeat',
          items: { k: 'read', atom: 1 },
          key: { k: 'item', path: 'id' },
          tpl: {
            k: 'el',
            tag: 'p',
            props: { attrs: {}, style: {}, on: [] },
            children: [{ k: 'text', value: { k: 'item', path: 'label' } }],
          },
        },
      };

      const runtime = boot(ir, app, { target: THORM_TARGET_CLIENT });

      const labels = () => Array.from(app.querySelectorAll('p')).map((el) => el.textContent).join('|');

      await step('initial rows render from the items atom', async () => {
        assertEqual(labels(), 'One|Two', 'initial list should render both rows');
      });

      await step('updating the list reconciles row content and order', async () => {
        runtime.core.store.atoms.get(1).v = [
          { id: 2, label: 'Two updated' },
          { id: 3, label: 'Three' },
        ];
        runtime.core.store.notify(1);
        await waitMicrotasks();
        assertEqual(labels(), 'Two updated|Three', 'list should reflect the updated rows');
      });
    });
  </script>
</body>
</html>
