<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-fallback</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-fallback', 'Route fallback should render when no route matches the current path.', async ({ app, step, assertEqual, assertContains }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/missing/page?tab=none');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/', re: '/^\\/$/', keys: [] },
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [
            { k: 'text', value: { k: 'val', v: 'Home' } },
            { k: 'text', value: { k: 'param', name: 'id' } },
          ],
          fallback: {
            k: 'el',
            tag: 'div',
            props: { attrs: { id: 'fallback-view' }, style: {}, on: [] },
            children: [
              { k: 'text', value: { k: 'val', v: 'Fallback:' } },
              { k: 'text', value: { k: 'query', name: 'tab' } },
            ],
          },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('unmatched paths render the fallback view', async () => {
          const fallback = app.querySelector('#fallback-view');
          assertEqual(!!fallback, true, 'fallback view should be mounted for unmatched paths');
          assertContains(fallback.textContent, 'Fallback:none', 'fallback view should still receive route query context');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
