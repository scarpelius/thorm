<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-query-reroute</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-query-reroute', 'Hydration should preserve query-only route markup and refresh it when only the query string changes.', async ({ app, step, click, waitFor, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/search?term=dune&sort=asc');

      app.innerHTML = '<!--route:start--><!--fragment:start--><button id="update-query">Update query</button><div id="query-view"><span id="query-term">dune</span>:<span id="query-sort">asc</span></div><!--fragment:end--><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/search', re: '/^\\/search$/', keys: [] },
          ],
          views: [{
            k: 'fragment',
            children: [
              {
                k: 'el',
                tag: 'button',
                props: {
                  attrs: { id: 'update-query' },
                  style: {},
                  on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/search?term=foundation&sort=desc' } } }],
                },
                children: [{ k: 'text', value: { k: 'val', v: 'Update query' } }],
              },
              {
                k: 'el',
                tag: 'div',
                props: { attrs: { id: 'query-view' }, style: {}, on: [] },
                children: [
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-term' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'term' } }],
                  },
                  { k: 'text', value: { k: 'val', v: ':' } },
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-sort' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'sort' } }],
                  },
                ],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial query-string route output', async () => {
          assertEqual(app.querySelector('#update-query').textContent, 'Update query', 'query update button should hydrate in place');
          assertEqual(app.querySelector('#query-view').textContent, 'dune:asc', 'hydrated route should preserve the initial query-string output');
        });

        await step('hydrated route rerenders when only the query string changes', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#update-query'));
          await waitFor(() => {
            assertEqual(app.querySelector('#query-view').textContent, 'foundation:desc', 'query-only navigation should refresh the hydrated route output');
          }, { label: 'hydrated route query reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
