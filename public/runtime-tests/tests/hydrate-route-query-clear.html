<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-query-clear</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-query-clear', 'Hydration should preserve query values and clear them when navigation removes the query string.', async ({ app, step, click, waitFor, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/search?term=dune&sort=asc');

      app.innerHTML = '<!--route:start--><!--fragment:start--><button id="clear-query">Clear query</button><div id="query-view"><span id="query-term">dune</span>|<span id="query-sort">asc</span></div><!--fragment:end--><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/search', re: '/^\\/search$/', keys: [] },
          ],
          views: [{
            k: 'fragment',
            children: [
              {
                k: 'el',
                tag: 'button',
                props: {
                  attrs: { id: 'clear-query' },
                  style: {},
                  on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/search' } } }],
                },
                children: [{ k: 'text', value: { k: 'val', v: 'Clear query' } }],
              },
              {
                k: 'el',
                tag: 'div',
                props: { attrs: { id: 'query-view' }, style: {}, on: [] },
                children: [
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-term' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'term' } }],
                  },
                  { k: 'text', value: { k: 'val', v: '|' } },
                  {
                    k: 'el',
                    tag: 'span',
                    props: { attrs: { id: 'query-sort' }, style: {}, on: [] },
                    children: [{ k: 'text', value: { k: 'query', name: 'sort' } }],
                  },
                ],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial query-string output', async () => {
          assertEqual(app.querySelector('#clear-query').textContent, 'Clear query', 'query clear button should hydrate in place');
          assertEqual(app.querySelector('#query-view').textContent, 'dune|asc', 'hydrated route should preserve the initial query-string values');
        });

        await step('hydrated route clears query-driven output when the query string is removed', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#clear-query'));
          await waitFor(() => {
            assertEqual(app.querySelector('#query-term').textContent, '', 'removed query term should clear after hydrated navigation');
            assertEqual(app.querySelector('#query-sort').textContent, '', 'removed query sort should clear after hydrated navigation');
            assertEqual(app.querySelector('#query-view').textContent, '|', 'only the static separator should remain after hydrated query removal');
          }, { label: 'hydrated route query clear' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
