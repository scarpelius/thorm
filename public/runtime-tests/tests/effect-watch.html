<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>effect-watch</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('effect-watch', 'Watch effects should react when the watched expression changes.', async ({ app, step, click, waitFor, assertEqual }) => {
      const ir = {
        atoms: [
          { id: 1, initial: 1 },
          { id: 2, initial: 'idle' },
        ],
        root: {
          k: 'fragment',
          children: [
            {
              k: 'effect',
              triggers: [{
                type: 'watch',
                expr: { k: 'read', atom: 1 },
                immediate: false,
              }],
              actions: [{
                k: 'set',
                atom: 2,
                to: { k: 'val', v: 'changed' },
              }],
            },
            {
              k: 'el',
              tag: 'div',
              props: { attrs: {}, style: {}, on: [] },
              children: [
                {
                  k: 'el',
                  tag: 'button',
                  props: {
                    attrs: { id: 'watch-source' },
                    style: {},
                    on: [{ event: 'click', action: { k: 'inc', atom: 1, by: 1 } }],
                  },
                  children: [{ k: 'text', value: { k: 'val', v: 'Inc source' } }],
                },
                {
                  k: 'el',
                  tag: 'span',
                  props: { attrs: { id: 'watch-target' }, style: {}, on: [] },
                  children: [{ k: 'text', value: { k: 'read', atom: 2 } }],
                },
              ],
            },
          ],
        },
      };

      boot(ir, app, { target: THORM_TARGET_CLIENT });
      const button = app.querySelector('#watch-source');
      const target = app.querySelector('#watch-target');

      await step('watch target starts unchanged before the source mutates', async () => {
        assertEqual(target.textContent, 'idle', 'watch action should not run before source changes');
      });

      await step('mutating the watched atom triggers the watch action', async () => {
        click(button);
        await waitFor(() => {
          assertEqual(target.textContent, 'changed', 'watch effect should run after source changes');
        }, { label: 'watch effect result' });
      });
    });
  </script>
</body>
</html>
