<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-no-base</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-no-base', 'Route matching should work when no explicit base is configured.', async ({ app, step, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/users/42?tab=info');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          table: [
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [{
            k: 'el',
            tag: 'div',
            props: { attrs: { id: 'no-base-view' }, style: {}, on: [] },
            children: [
              { k: 'text', value: { k: 'param', name: 'id' } },
              { k: 'text', value: { k: 'val', v: ':' } },
              { k: 'text', value: { k: 'query', name: 'tab' } },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('route uses the current pathname directly when base is omitted', async () => {
          assertEqual(app.querySelector('#no-base-view').textContent, '42:info', 'route should match without requiring an explicit base');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
