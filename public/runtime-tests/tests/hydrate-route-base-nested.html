<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-base-nested</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-base-nested', 'Hydration should preserve nested-base route matches and keep them correct after navigation.', async ({ app, step, click, waitFor, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/admin/users/42');

      app.innerHTML = '<!--route:start--><!--fragment:start--><button id="next-user">Open next user</button><div id="nested-base-view">User:42</div><!--fragment:end--><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app/admin',
          table: [
            { pat: '/users/:id', re: '/^\\/users\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [{
            k: 'fragment',
            children: [
              {
                k: 'el',
                tag: 'button',
                props: {
                  attrs: { id: 'next-user' },
                  style: {},
                  on: [{ event: 'click', action: { k: 'navigate', to: { k: 'val', v: '/app/admin/users/99' } } }],
                },
                children: [{ k: 'text', value: { k: 'val', v: 'Open next user' } }],
              },
              {
                k: 'el',
                tag: 'div',
                props: { attrs: { id: 'nested-base-view' }, style: {}, on: [] },
                children: [
                  { k: 'text', value: { k: 'val', v: 'User:' } },
                  { k: 'text', value: { k: 'param', name: 'id' } },
                ],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial nested-base route match', async () => {
          assertEqual(app.querySelector('#next-user').textContent, 'Open next user', 'route button should hydrate in place');
          assertEqual(app.querySelector('#nested-base-view').textContent, 'User:42', 'hydrated route should preserve the matched nested-base view');
        });

        await step('hydrated route keeps stripping the nested base after navigation', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          click(app.querySelector('#next-user'));
          await waitFor(() => {
            assertEqual(app.querySelector('#nested-base-view').textContent, 'User:99', 'hydrated route should keep matching after stripping the nested base path');
          }, { label: 'hydrated nested base reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
