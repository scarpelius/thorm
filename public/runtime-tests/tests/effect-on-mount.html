<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>effect-on-mount</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('effect-on-mount', 'Mount effects should run once when the tree is mounted.', async ({ app, step, waitFor, assertEqual }) => {
      const ir = {
        atoms: [{ id: 1, initial: 1 }],
        root: {
          k: 'fragment',
          children: [
            {
              k: 'effect',
              triggers: [{ type: 'mount' }],
              actions: [{ k: 'inc', atom: 1, by: 1 }],
            },
            {
              k: 'el',
              tag: 'span',
              props: { attrs: { id: 'mount-value' }, style: {}, on: [] },
              children: [{ k: 'text', value: { k: 'read', atom: 1 } }],
            },
          ],
        },
      };

      boot(ir, app, { target: THORM_TARGET_CLIENT });
      const value = app.querySelector('#mount-value');

      await step('mount effect increments the atom once', async () => {
        await waitFor(() => {
          assertEqual(value.textContent, '2', 'mount effect should update the atom after boot');
        }, { label: 'mount effect result' });
      });
    });
  </script>
</body>
</html>
