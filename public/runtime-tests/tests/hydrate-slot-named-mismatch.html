<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-slot-named-mismatch</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-slot-named-mismatch', 'Hydration should fail clearly when named slot SSR markup is missing.', async ({ app, step, assert, assertContains }) => {
      app.innerHTML = '<!--component:start--><article><header><!--slot:start--><!--slot:end--></header></article><!--component:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'component',
          slots: {
            title: [{
              k: 'el',
              tag: 'h1',
              props: { attrs: { id: 'missing-title-slot' }, style: {}, on: [] },
              children: [{ k: 'text', value: { k: 'val', v: 'Projected title' } }],
            }],
          },
          tpl: {
            k: 'el',
            tag: 'article',
            props: { attrs: {}, style: {}, on: [] },
            children: [{
              k: 'el',
              tag: 'header',
              props: { attrs: {}, style: {}, on: [] },
              children: [{ k: 'slot', name: 'title' }],
            }],
          },
        },
      };

      await step('missing named slot markup raises a hydration error with a useful message', async () => {
        let message = '';
        try {
          boot(ir, app, { target: THORM_TARGET_SERVER, state: { atoms: {} } });
        } catch (error) {
          message = error?.message ?? String(error);
        }
        assert(message !== '', 'named slot hydration mismatch should throw instead of silently succeeding');
        assertContains(message, '[hydrate] expected <h1>', 'named slot hydration mismatch should fail on the missing named projected child node');
      });
    });
  </script>
</body>
</html>
