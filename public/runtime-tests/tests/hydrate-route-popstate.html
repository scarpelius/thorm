<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-route-popstate</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-route-popstate', 'Hydration should preserve route markup and still respond to browser popstate events.', async ({ app, step, waitFor, assertEqual, assertContains }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app');

      app.innerHTML = '<!--route:start--><div id="home-view">Home</div><!--route:end-->';

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/', re: '/^\\/$/', keys: [] },
            { pat: '/details/:id', re: '/^\\/details\\/([^/]+)$/', keys: ['id'] },
          ],
          views: [
            {
              k: 'el',
              tag: 'div',
              props: { attrs: { id: 'home-view' }, style: {}, on: [] },
              children: [{ k: 'text', value: { k: 'val', v: 'Home' } }],
            },
            {
              k: 'el',
              tag: 'div',
              props: { attrs: { id: 'details-view' }, style: {}, on: [] },
              children: [
                { k: 'text', value: { k: 'val', v: 'Details:' } },
                { k: 'text', value: { k: 'param', name: 'id' } },
              ],
            },
          ],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_SERVER });

        await step('hydration preserves the initial matched route view', async () => {
          assertEqual(app.querySelector('#home-view').textContent, 'Home', 'home route view should hydrate in place');
          assertContains(app.innerHTML, '<!--route:start-->', 'route start anchor should remain present after hydration');
          assertContains(app.innerHTML, '<!--route:end-->', 'route end anchor should remain present after hydration');
        });

        await step('hydrated route still rerenders on popstate', async () => {
          await new Promise((resolve) => setTimeout(resolve, 3000));
          history.pushState(null, '', '/app/details/42');
          window.dispatchEvent(new PopStateEvent('popstate'));
          await waitFor(() => {
            assertEqual(app.querySelector('#details-view').textContent, 'Details:42', 'hydrated route should rerender for the current history URL on popstate');
          }, { label: 'hydrated route popstate reroute' });
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
