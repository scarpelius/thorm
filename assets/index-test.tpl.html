<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="/images/favicon-16.png">
<title>{$title}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div id="{$containerId}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    window.__THORM_DEV__ = true;
    window.something = "something something";
</script>
<script type="module">
    import { mount } from '/runtime/index.js';

    const RT = (async function () {
        const res = await fetch('{$iruri_dir}{$iruri}', { cache: 'no-store' });
        const ir = await res.json();
        const x = mount(ir, document.getElementById('app'));
        const atoms = x?.core?.store?.atoms;
        const subs = x?.core?.store?.subs;
        const notify = typeof x?.core?.store?.notify === 'function'
            ? x.core.store.notify.bind(x.core.store)
            : (typeof x?.core?.notify === 'function'
                ? x.core.notify.bind(x.core)
                : null)
        return {
        atoms:  atoms ?? null,
        subs:   subs  ?? null,
        // if notify exists, bind it to its host to preserve `this`
        notify: notify
        };
    })();
    RT.then(result => {
        window.__THORM_RUNTIME__ = result;
        import('/runtime/devtools/devtools.js');
        return result;
    });

</script>
</body>
</html>
