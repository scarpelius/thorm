<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>route-query-decoded</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_CLIENT } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('route-query-decoded', 'Route query expressions should receive decoded query-string values.', async ({ app, step, assertEqual }) => {
      const originalUrl = location.pathname + location.search + location.hash;
      history.replaceState(null, '', '/app/search?term=Ada%20Lovelace&topic=notes%2Fintro');

      const ir = {
        atoms: [],
        root: {
          k: 'route',
          base: '/app',
          table: [
            { pat: '/search', re: '/^\\/search$/', keys: [] },
          ],
          views: [{
            k: 'el',
            tag: 'div',
            props: { attrs: { id: 'query-view' }, style: {}, on: [] },
            children: [
              {
                k: 'el',
                tag: 'span',
                props: { attrs: { id: 'query-term' }, style: {}, on: [] },
                children: [{ k: 'text', value: { k: 'query', name: 'term' } }],
              },
              { k: 'text', value: { k: 'val', v: ' | ' } },
              {
                k: 'el',
                tag: 'span',
                props: { attrs: { id: 'query-topic' }, style: {}, on: [] },
                children: [{ k: 'text', value: { k: 'query', name: 'topic' } }],
              },
            ],
          }],
          fallback: { k: 'text', value: { k: 'val', v: 'Not found' } },
        },
      };

      try {
        boot(ir, app, { target: THORM_TARGET_CLIENT });

        await step('encoded query values are decoded in the matched route view', async () => {
          assertEqual(app.querySelector('#query-term').textContent, 'Ada Lovelace', 'space-encoded query values should be decoded');
          assertEqual(app.querySelector('#query-topic').textContent, 'notes/intro', 'slash-encoded query values should be decoded');
          assertEqual(app.querySelector('#query-view').textContent, 'Ada Lovelace | notes/intro', 'decoded query values should render with the expected separator');
        });
      } finally {
        history.replaceState(null, '', originalUrl);
      }
    });
  </script>
</body>
</html>
