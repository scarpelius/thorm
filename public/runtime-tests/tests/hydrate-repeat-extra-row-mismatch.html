<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hydrate-repeat-extra-row-mismatch</title>
</head>
<body>
  <script type="module">
    import { boot, THORM_TARGET_SERVER } from '../../runtime/index.js';
    import { runPage } from '../assert.js';

    await runPage('hydrate-repeat-extra-row-mismatch', 'Hydration should fail clearly when SSR-like repeat markup contains an extra keyed row.', async ({ app, step, assert, assertContains }) => {
      app.innerHTML = '<div><ul><!--repeat:start--><!--repeat:row:a:start--><li>Ada</li><!--repeat:row:a:end--><!--repeat:row:b:start--><li>Bea</li><!--repeat:row:b:end--><!--repeat:end--></ul></div>';

      const ir = {
        atoms: [{
          id: 1,
          initial: [
            { id: 'a', label: 'Ada' },
          ],
        }],
        root: {
          k: 'el',
          tag: 'div',
          props: { attrs: {}, style: {}, on: [] },
          children: [{
            k: 'el',
            tag: 'ul',
            props: { attrs: {}, style: {}, on: [] },
            children: [{
              k: 'repeat',
              items: { k: 'read', atom: 1 },
              key: { k: 'item', path: 'id' },
              tpl: {
                k: 'el',
                tag: 'li',
                props: { attrs: {}, style: {}, on: [] },
                children: [{ k: 'text', value: { k: 'item', path: 'label' } }],
              },
            }],
          }],
        },
      };

      await step('extra repeat row markup raises a hydration error with a useful message', async () => {
        let message = '';
        try {
          boot(ir, app, { target: THORM_TARGET_SERVER, state: { atoms: { 1: [{ id: 'a', label: 'Ada' }] } } });
        } catch (error) {
          message = error?.message ?? String(error);
        }
        assert(message !== '', 'extra repeat row hydration mismatch should throw instead of silently succeeding');
        assertContains(message, '[hydrate] expected comment repeat:end', 'extra repeat row hydration mismatch should fail on the unexpected extra row markup');
      });
    });
  </script>
</body>
</html>
